    const { useState, useMemo, useRef, useCallback, useEffect } = React;

    // ── eBay JSONP Search ──────────────────────────────────────
    function searchEbaySold(keywords) {
      return new Promise((resolve, reject) => {
        const cbName = "ebay_cb_" + Date.now();
        const script = document.createElement("script");
        const q = encodeURIComponent(keywords);
        script.src = [
          "https://svcs.ebay.com/services/search/FindingService/v1",
          "?OPERATION-NAME=findCompletedItems",
          "&SERVICE-VERSION=1.0.0",
          `&SECURITY-APPNAME=${EBAY_APP_ID}`,
          "&RESPONSE-DATA-FORMAT=JSON",
          `&callback=${cbName}`,
          "&REST-PAYLOAD",
          `&keywords=${q}`,
          "&itemFilter(0).name=SoldItemsOnly",
          "&itemFilter(0).value=true",
          "&paginationInput.entriesPerPage=20",
          "&sortOrder=EndTimeSoonest",
        ].join("");

        const cleanup = () => {
          delete window[cbName];
          if (script.parentNode) document.body.removeChild(script);
        };

        window[cbName] = (data) => {
          cleanup();
          try {
            const res = data.findCompletedItemsResponse[0];
            const items = res.searchResult[0].item || [];
            const parsed = items
              .filter(i => i.sellingStatus && i.sellingStatus[0].currentPrice)
              .map(i => ({
                title:  i.title[0],
                price:  parseFloat(i.sellingStatus[0].currentPrice[0].__value__),
                date:   i.listingInfo[0].endTime[0].slice(0, 10),
                url:    i.viewItemURL[0],
              }))
              .filter(i => !isNaN(i.price) && i.price > 0);
            resolve(parsed);
          } catch(e) { resolve([]); }
        };

        script.onerror = () => { cleanup(); reject(new Error("eBay API error")); };
        setTimeout(() => { cleanup(); reject(new Error("Timeout")); }, 10000);
        document.body.appendChild(script);
      });
    }

    // ── Price Tracker Modal ────────────────────────────────────
    function PriceTrackerModal({ item, onClose }) {
      const [status,  setStatus]  = useState("loading"); // loading | done | error
      const [sales,   setSales]   = useState([]);
      const [keyword, setKeyword] = useState(item.name);
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      const fetchPrices = useCallback(async (kw) => {
        setStatus("loading"); setSales([]);
        try {
          const data = await searchEbaySold(kw);
          setSales(data);
          setStatus(data.length > 0 ? "done" : "empty");
        } catch(e) {
          setStatus("error");
        }
      }, []);

      useEffect(() => { fetchPrices(item.name); }, []);

      useEffect(() => {
        if (status !== "done" || sales.length === 0 || !chartRef.current) return;
        if (chartInstance.current) chartInstance.current.destroy();

        const sorted = [...sales].sort((a,b) => a.date.localeCompare(b.date));
        const labels = sorted.map(s => s.date);
        const data   = sorted.map(s => s.price);
        const avg    = data.reduce((a,b)=>a+b,0)/data.length;

        chartInstance.current = new Chart(chartRef.current, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                label: "Sold Price (USD)",
                data,
                borderColor: "#111",
                backgroundColor: "rgba(17,17,17,0.06)",
                borderWidth: 2,
                pointBackgroundColor: "#111",
                pointRadius: 4,
                tension: 0.3,
                fill: true,
              },
              {
                label: "Avg",
                data: labels.map(()=>avg),
                borderColor: "#E8522A",
                borderWidth: 1.5,
                borderDash: [6,3],
                pointRadius: 0,
                fill: false,
              }
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: "top", labels: { font: { size: 11 }, boxWidth: 20 } },
              tooltip: {
                callbacks: {
                  label: ctx => `$${ctx.parsed.y.toFixed(0)}`,
                }
              }
            },
            scales: {
              x: { ticks: { font:{size:10}, maxTicksLimit: 8 }, grid:{display:false} },
              y: { ticks: { callback: v=>`$${v}`, font:{size:10} } },
            },
          },
        });
        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [status, sales]);

      const prices = sales.map(s=>s.price);
      const avg    = prices.length ? prices.reduce((a,b)=>a+b,0)/prices.length : 0;
      const high   = prices.length ? Math.max(...prices) : 0;
      const low    = prices.length ? Math.min(...prices) : 0;
      const myVal  = item.value || 0;
      const diff   = avg > 0 ? ((myVal - avg) / avg * 100) : 0;

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:20}}>
          <div style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:700,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>

            {/* Header */}
            <div style={{padding:"24px 28px 0",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:20}}>📊</span>
                  <span style={{fontSize:16,fontWeight:800,color:"#111"}}>eBay Market Price</span>
                </div>
                <div style={{fontSize:12,color:"#9CA3AF"}}>{item.name}</div>
              </div>
              <button onClick={onClose} style={{background:"#F3F4F6",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:"#6B7280",flexShrink:0}}>✕</button>
            </div>

            {/* Search bar */}
            <div style={{padding:"16px 28px 0",display:"flex",gap:8}}>
              <input
                value={keyword}
                onChange={e=>setKeyword(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&fetchPrices(keyword)}
                placeholder="Refine search…"
                style={{flex:1,padding:"9px 14px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,outline:"none"}}
                onFocus={e=>e.target.style.borderColor="#111"}
                onBlur={e=>e.target.style.borderColor="#E5E7EB"}
              />
              <button onClick={()=>fetchPrices(keyword)} style={{background:"#111",color:"#fff",border:"none",borderRadius:10,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                Search
              </button>
            </div>

            <div style={{padding:"20px 28px 28px"}}>
              {status === "loading" && (
                <div style={{textAlign:"center",padding:"40px 0",color:"#9CA3AF"}}>
                  <div style={{fontSize:32,marginBottom:8}} className="spinner">⏳</div>
                  <div style={{fontSize:13}}>Searching eBay sold listings…</div>
                </div>
              )}

              {status === "error" && (
                <div style={{textAlign:"center",padding:"40px 0",color:"#EF4444"}}>
                  <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
                  <div style={{fontSize:13,fontWeight:600}}>Failed to fetch eBay data</div>
                  <button onClick={()=>fetchPrices(keyword)} style={{marginTop:12,background:"#111",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,cursor:"pointer"}}>Retry</button>
                </div>
              )}

              {status === "empty" && (
                <div style={{textAlign:"center",padding:"40px 0",color:"#9CA3AF"}}>
                  <div style={{fontSize:32,marginBottom:8}}>🔍</div>
                  <div style={{fontSize:13}}>No sold listings found. Try a shorter keyword.</div>
                </div>
              )}

              {status === "done" && sales.length > 0 && (
                <>
                  {/* Stats row */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
                    {[
                      {label:"Avg Price",  value:`$${avg.toFixed(0)}`,  color:"#111"},
                      {label:"Highest",    value:`$${high.toFixed(0)}`, color:"#16A34A"},
                      {label:"Lowest",     value:`$${low.toFixed(0)}`,  color:"#E8522A"},
                      {label:"vs My Value",value:`${diff>=0?"+":""}${diff.toFixed(0)}%`, color:diff>=0?"#16A34A":"#E8522A"},
                    ].map(s=>(
                      <div key={s.label} style={{background:"#F8F8F8",borderRadius:12,padding:"12px 14px",textAlign:"center"}}>
                        <div style={{fontSize:10,fontWeight:600,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:0.6,marginBottom:4}}>{s.label}</div>
                        <div style={{fontSize:18,fontWeight:800,color:s.color}}>{s.value}</div>
                      </div>
                    ))}
                  </div>

                  {/* Chart */}
                  <div style={{height:220,marginBottom:20,background:"#FAFAFA",borderRadius:12,padding:"12px"}}>
                    <canvas ref={chartRef}/>
                  </div>

                  {/* Recent sales list */}
                  <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10,textTransform:"uppercase",letterSpacing:0.6}}>
                    Recent Sales ({sales.length})
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {sales.slice(0,15).map((s,i)=>(
                      <a key={i} href={s.url} target="_blank" rel="noopener noreferrer"
                        style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,border:"1px solid #F0F0F0",textDecoration:"none",color:"inherit",transition:"background 0.15s"}}

                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}

                        <div style={{flex:1,fontSize:12,color:"#374151",marginRight:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</div>
                        <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
                          <span style={{fontSize:11,color:"#9CA3AF"}}>{s.date}</span>
                          <span style={{fontSize:14,fontWeight:800,color:"#111",minWidth:60,textAlign:"right"}}>${s.price.toFixed(0)}</span>
                        </div>
                      </a>
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );

    // ── Insights Modal ─────────────────────────────────────────
    function InsightsModal({ items, seriesList, allCats, isAdmin, onClose, onAddSeries, onDeleteSeries }) {
      const [tab, setTab] = useState("spending"); // spending | series
      const pieRef  = useRef(null);
      const pieInst = useRef(null);

      const COLORS = ["#E8522A","#F5C518","#2563EB","#16A34A","#9333EA","#EC4899"];
      const CAT_COLORS = { "NBA Card":"#E8522A","Pokemon Card":"#F5C518","Jersey":"#2563EB","Toy":"#16A34A","Other":"#9333EA" };

      // Spending stats
      const spendingByCat = useMemo(() => {
        const map = {};
        items.forEach(i => {
          if (!map[i.category]) map[i.category] = 0;
          map[i.category] += i.value || 0;
        });
        return Object.entries(map).sort((a,b)=>b[1]-a[1]);
      }, [items]);
      const totalSpend = spendingByCat.reduce((s,[,v])=>s+v, 0);

      // Pie chart
      useEffect(() => {
        if (tab !== "spending" || !pieRef.current || spendingByCat.length === 0) return;
        if (pieInst.current) pieInst.current.destroy();
        pieInst.current = new Chart(pieRef.current, {
          type: "doughnut",
          data: {
            labels: spendingByCat.map(([k])=>k),
            datasets: [{
              data: spendingByCat.map(([,v])=>v),
              backgroundColor: spendingByCat.map(([k])=>CAT_COLORS[k]||"#9CA3AF"),
              borderWidth: 2,
              borderColor: "#fff",
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: "65%",
            plugins: {
              legend: { position:"right", labels:{ font:{size:11}, boxWidth:14, padding:12 } },
              tooltip: { callbacks: { label: ctx => ` $${ctx.parsed.toLocaleString()} (${((ctx.parsed/totalSpend)*100).toFixed(0)}%)` } },
            },
          },
        });
        return () => { if (pieInst.current) pieInst.current.destroy(); };
      }, [tab, spendingByCat]);

      // Series completion
      const seriesStats = useMemo(() => {
        return seriesList.map(s => {
          const owned = items.filter(i => i.series === s.name).length;
          const pct   = s.total > 0 ? Math.min(100, Math.round(owned / s.total * 100)) : 0;
          return { ...s, owned, pct };
        }).sort((a,b) => b.pct - a.pct);
      }, [seriesList, items]);

      // Add series form
      const [newName,  setNewName]  = useState("");
      const [newTotal, setNewTotal] = useState("");
      const [newCat,   setNewCat]   = useState("Pokemon Card");
      const [adding,   setAdding]   = useState(false);

      const handleAddSeries = async () => {
        if (!newName.trim() || !newTotal) return;
        setAdding(true);
        await onAddSeries({ name: newName.trim(), total: parseInt(newTotal), category: newCat });
        setNewName(""); setNewTotal(""); setAdding(false);
      };

      const CATS = allCats ? allCats.filter(c=>c!=="All") : DEFAULT_CATS;

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:20}}>
          <div style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:760,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>

            {/* Header */}
            <div style={{padding:"24px 28px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>📈</span>
                <span style={{fontSize:18,fontWeight:800,color:"#111"}}>Data Insights</span>
              </div>
              <button onClick={onClose} style={{background:"#F3F4F6",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:"#6B7280"}}>✕</button>
            </div>

            {/* Tabs */}
            <div style={{padding:"16px 28px 0",display:"flex",gap:8}}>
              {[["spending","💸 Spending"],["series","🏆 Series"]].map(([k,label])=>(
                <button key={k} onClick={()=>setTab(k)} style={{padding:"8px 20px",borderRadius:20,fontSize:13,fontWeight:600,cursor:"pointer",border:tab===k?"2px solid #111":"1.5px solid #E5E7EB",background:tab===k?"#111":"#fff",color:tab===k?"#fff":"#6B7280"}}>
                  {label}
                </button>
              ))}
            </div>

            <div style={{padding:"20px 28px 28px"}}>

              {/* ── SPENDING TAB ── */}
              {tab === "spending" && (
                <>
                  {items.length === 0 ? (
                    <div style={{textAlign:"center",padding:"40px 0",color:"#9CA3AF"}}>
                      <div style={{fontSize:36,marginBottom:8}}>💸</div>
                      <div style={{fontSize:13}}>Add some items to see spending stats!</div>
                    </div>
                  ) : (
                    <>
                      {/* Total */}
                      <div style={{textAlign:"center",marginBottom:20}}>
                        <div style={{fontSize:12,fontWeight:600,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Total Collection Value</div>
                        <div style={{fontSize:36,fontWeight:900,color:"#111",letterSpacing:-1}}>${totalSpend.toLocaleString()}</div>
                        <div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>{items.length} items across {spendingByCat.length} categories</div>
                      </div>

                      {/* Donut chart */}
                      <div style={{height:220,marginBottom:24}}>
                        <canvas ref={pieRef}/>
                      </div>

                      {/* Category breakdown bars */}
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        {spendingByCat.map(([cat, val], i) => {
                          const pct = totalSpend > 0 ? (val/totalSpend*100) : 0;
                          const col = CAT_COLORS[cat] || COLORS[i % COLORS.length];
                          const count = items.filter(it=>it.category===cat).length;
                          return (
                            <div key={cat} style={{background:"#F8F8F8",borderRadius:12,padding:"14px 16px"}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                                <div style={{display:"flex",alignItems:"center",gap:8}}>
                                  <div style={{width:10,height:10,borderRadius:"50%",background:col,flexShrink:0}}/>
                                  <span style={{fontSize:13,fontWeight:700,color:"#111"}}>{cat}</span>
                                  <span style={{fontSize:11,color:"#9CA3AF"}}>{count} items</span>
                                </div>
                                <div style={{textAlign:"right"}}>
                                  <span style={{fontSize:15,fontWeight:800,color:"#111"}}>${val.toLocaleString()}</span>
                                  <span style={{fontSize:11,color:"#9CA3AF",marginLeft:6}}>{pct.toFixed(0)}%</span>
                                </div>
                              </div>
                              <div style={{height:6,background:"#E5E7EB",borderRadius:10,overflow:"hidden"}}>
                                <div style={{height:"100%",width:`${pct}%`,background:col,borderRadius:10,transition:"width 0.6s ease"}}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      {/* Fun insight */}
                      {spendingByCat.length > 0 && (
                        <div style={{marginTop:16,padding:"14px 18px",background:"#FFF7ED",borderRadius:12,border:"1px solid #FED7AA"}}>
                          <span style={{fontSize:13,color:"#C2410C"}}>
                            🔥 你最大洗費係 <strong>{spendingByCat[0][0]}</strong>，佔總值 <strong>{(spendingByCat[0][1]/totalSpend*100).toFixed(0)}%</strong>！
                          </span>

              )}

              {/* ── SERIES TAB ── */}
              {tab === "series" && (
                <>

                  {isAdmin && (
                    <div style={{background:"#F8F8F8",borderRadius:14,padding:"16px",marginBottom:20}}>

                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Series name (e.g. Pokemon 151 White)"
                          style={{flex:"2 1 160px",padding:"9px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,outline:"none"}}
                          onFocus={e=>e.target.style.borderColor="#111"} onBlur={e=>e.target.style.borderColor="#E5E7EB"}/>
                        <input value={newTotal} onChange={e=>setNewTotal(e.target.value)} placeholder="Total cards" type="number" min="1"
                          style={{flex:"1 1 100px",padding:"9px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,outline:"none"}}
                          onFocus={e=>e.target.style.borderColor="#111"} onBlur={e=>e.target.style.borderColor="#E5E7EB"}/>
                        <select value={newCat} onChange={e=>setNewCat(e.target.value)}
                          style={{flex:"1 1 120px",padding:"9px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,background:"#fff"}}>
                          {CATS.map(c=><option key={c}>{c}</option>)}
                        </select>
                        <button onClick={handleAddSeries} disabled={adding||!newName||!newTotal} style={{padding:"9px 18px",background:"#111",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:adding?"not-allowed":"pointer",opacity:adding||!newName||!newTotal?0.5:1}}>
                          {adding?"Adding…":"Add"}
                        </button>
                      </div>
                    </div>
                  )}

                  {seriesStats.length === 0 ? (
                    <div style={{textAlign:"center",padding:"40px 0",color:"#9CA3AF"}}>
                      <div style={{fontSize:36,marginBottom:8}}>🏆</div>
                      <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>No series yet!</div>
                      <div style={{fontSize:12}}>{isAdmin ? "Add a series above to start tracking completion." : "Admin hasn't set up any series yet."}</div>
                    </div>
                  ) : (
                    <div style={{display:"flex",flexDirection:"column",gap:12}}>
                      {seriesStats.map(s => {
                        const col = CAT_COLORS[s.category] || "#6B7280";
                        const isComplete = s.pct >= 100;
                        return (
                          <div key={s.id} style={{background:isComplete?"#F0FDF4":"#fff",borderRadius:14,border:`1px solid ${isComplete?"#BBF7D0":"#F0F0F0"}`,padding:"16px 18px",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                              <div>
                                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                                  {isComplete && <span style={{fontSize:14}}>🎉</span>}
                                  <span style={{fontSize:14,fontWeight:800,color:"#111"}}>{s.name}</span>
                                </div>
                                <div style={{fontSize:11,color:"#9CA3AF"}}>{s.category}</div>
                              </div>
                              <div style={{textAlign:"right",display:"flex",alignItems:"center",gap:10}}>
                                <div>

            </div>

    function compressImage(dataUrl, maxWidth = 600, quality = 0.78) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = dataUrl;
      });
    }

    const PSA_GRADES = ["PSA 10","PSA 9","PSA 8","PSA 7","PSA 6","BGS 9.5","BGS 9","Other"];
    const PRESET_SUBSUBCATS = {
      // NBA Card — graded
      "NBA Card||Graded (PSA/BGS)":    PSA_GRADES,
      "NBA Card||PSA card":            PSA_GRADES,
      "NBA Card||PSA Card":            PSA_GRADES,

      "Pokemon Card||Graded":          PSA_GRADES,
    };
    // Helper: look up preset sub-subcats — case-insensitive subcategory match
    function getPresetSubSubcats(catName, subcatName) {
      const exact = catName+"||"+subcatName;
      if (PRESET_SUBSUBCATS[exact]) return PRESET_SUBSUBCATS[exact];
      // Try case-insensitive match on subcategory name
      const lc = subcatName.toLowerCase();
      const found = Object.keys(PRESET_SUBSUBCATS).find(k => {
        const [kCat, kSub] = k.split("||");
        return kCat===catName && kSub.toLowerCase()===lc;
      });
      return found ? PRESET_SUBSUBCATS[found] : [];
    }

    // ── Background Modal ───────────────────────────────────────
    function BackgroundModal({ current, onSave, onRemove, onClose }) {
      const [preview, setPreview] = useState(current?.image || null);
      const [overlay, setOverlay] = useState(current?.overlay ?? 0.25);
      const [blur,    setBlur]    = useState(current?.blur ?? 0);
      const [saving,  setSaving]  = useState(false);
      const [saveError, setSaveError] = useState("");
      const inputRef  = useRef(null);
      const [dragging,setDragging]= useState(false);
      const [compressing,setCompressing] = useState(false);
      const [imgSize,  setImgSize] = useState(0); // kb

      const compressToTarget = (dataUrl, maxW, quality) => new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = dataUrl;
      });

      const processFile = useCallback(async (file) => {
        if (!file || !file.type.startsWith("image/")) return;
        setCompressing(true); setSaveError("");
        const reader = new FileReader();
        reader.onload = async (e) => {
          // Start at 900px / quality 0.6, shrink further if still too large for Firestore
          let result = await compressToTarget(e.target.result, 900, 0.6);
          // Firestore doc limit ~800KB base64 to be safe
          if (result.length > 800000) result = await compressToTarget(e.target.result, 650, 0.5);
          if (result.length > 800000) result = await compressToTarget(e.target.result, 450, 0.45);
          setImgSize(Math.round(result.length / 1024));
          setPreview(result);
          setCompressing(false);
        };
        reader.readAsDataURL(file);
      }, []);

      const handleSave = async () => {
        if (!preview) return;
        setSaving(true); setSaveError("");
        try {
          await onSave({ image: preview, overlay, blur });
          setSaving(false);
          onClose();
        } catch(e) {
          setSaving(false);
          setSaveError(e?.message?.includes("exceeds")
            ? "圖片太大，請用更細嘅圖片試試"
            : "Save 失敗：" + (e?.message || "未知錯誤"));
        }
      };

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:20}}>
          <div style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:560,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.25)"}}>

            {/* Header */}
            <div style={{padding:"24px 28px 0",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>🖼️</span>
                <span style={{fontSize:18,fontWeight:800,color:"#111"}}>Background Image</span>
              </div>
              <button onClick={onClose} style={{background:"#F3F4F6",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:"#6B7280"}}>✕</button>
            </div>

            <div style={{padding:"0 28px 28px"}}>

              {/* Upload zone */}
              {preview ? (
                <div style={{position:"relative",borderRadius:14,overflow:"hidden",height:200,marginBottom:20,boxShadow:"0 4px 20px rgba(0,0,0,0.12)"}}>
                  <img src={preview} alt="bg preview" style={{width:"100%",height:"100%",objectFit:"cover",filter:`blur(${blur}px)`}}/>
                  <div style={{position:"absolute",inset:0,background:`rgba(0,0,0,${overlay})`}}/>
                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                    <button onClick={()=>inputRef.current.click()} style={{background:"rgba(255,255,255,0.9)",border:"none",borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",color:"#111"}}>Change Photo</button>
                    <button onClick={()=>setPreview(null)} style={{background:"rgba(220,38,38,0.85)",border:"none",borderRadius:10,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",color:"#fff"}}>Remove</button>
                  </div>
                </div>
              ) : (
                <div onClick={()=>inputRef.current.click()}
                  onDragOver={e=>{e.preventDefault();setDragging(true);}}
                  onDragLeave={()=>setDragging(false)}
                  onDrop={e=>{e.preventDefault();setDragging(false);processFile(e.dataTransfer.files[0]);}}
                  style={{border:`2px dashed ${dragging?"#111":"#D1D5DB"}`,borderRadius:14,height:160,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:dragging?"#F9F9F9":"#FAFAFA",gap:10,marginBottom:20}}>
                  {compressing
                    ? <><span style={{fontSize:28}} className="spinner">⏳</span><div style={{fontSize:13,color:"#9CA3AF"}}>Compressing…</div></>
                    : <><span style={{fontSize:36}}>🖼️</span><div style={{fontSize:14,fontWeight:600,color:"#374151"}}>Click to upload or drag & drop</div><div style={{fontSize:12,color:"#9CA3AF"}}>JPG, PNG, WEBP — recommended landscape</div></>
                  }
                </div>
              )}
              <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>

              {/* Controls */}
              {preview && (
                <>
                  <div style={{marginBottom:18}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <label style={{fontSize:13,fontWeight:600,color:"#374151"}}>Dark Overlay</label>
                      <span style={{fontSize:12,color:"#9CA3AF",fontWeight:600}}>{Math.round(overlay*100)}%</span>
                    </div>
                    <input type="range" min="0" max="0.75" step="0.05" value={overlay}
                      onChange={e=>setOverlay(parseFloat(e.target.value))}
                      style={{width:"100%",accentColor:"#111"}}/>
                    <div style={{fontSize:11,color:"#9CA3AF",marginTop:4}}>Higher overlay makes text easier to read over the background</div>
                  </div>

                  <div style={{marginBottom:22}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <label style={{fontSize:13,fontWeight:600,color:"#374151"}}>Background Blur</label>
                      <span style={{fontSize:12,color:"#9CA3AF",fontWeight:600}}>{blur}px</span>
                    </div>
                    <input type="range" min="0" max="20" step="1" value={blur}
                      onChange={e=>setBlur(parseInt(e.target.value))}
                      style={{width:"100%",accentColor:"#111"}}/>
                  </div>
                </>
              )}

              {/* Size indicator */}
              {preview && imgSize > 0 && (
                <div style={{fontSize:11,color: imgSize > 700 ? "#DC2626" : "#9CA3AF",marginBottom:10,textAlign:"right"}}>
                  圖片大小：{imgSize}KB {imgSize > 700 ? "⚠️ 可能太大" : "✓"}
                </div>
              )}

              {/* Error message */}
              {saveError && (
                <div style={{background:"#FEF2F2",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:"#DC2626",fontWeight:500}}>
                  ⚠️ {saveError}
                </div>
              )}

              {/* Buttons */}
              <div style={{display:"flex",gap:10}}>
                {current?.image && (
                  <button onClick={async()=>{await onRemove();onClose();}} style={{flex:1,padding:"11px",background:"#FEF2F2",color:"#DC2626",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer"}}>
                    🗑️ Remove Background
                  </button>
                )}
                <button onClick={handleSave} disabled={saving||!preview}
                  style={{flex:2,padding:"11px",background:saving||!preview?"#9CA3AF":"#111",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:saving||!preview?"not-allowed":"pointer"}}>
                  {saving ? <span>⏳ Saving…</span> : "✓ Apply Background"}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Subcategory Adder (inline) ─────────────────────────────

    function ItemCard({ item, isAdmin, onEdit, onDelete, onPriceCheck }) {
      const catColor = CATEGORY_COLORS[item.category] || "#6B7280";
      // Support both old single-image and new multi-image format
      const images = item.images?.length ? item.images : (item.image ? [item.image] : []);
      const [imgIdx, setImgIdx] = useState(0);
      const safeIdx = Math.min(imgIdx, images.length - 1);

      const prevImg = (e) => { e.stopPropagation(); setImgIdx(i => Math.max(0, i-1)); };
      const nextImg = (e) => { e.stopPropagation(); setImgIdx(i => Math.min(images.length-1, i+1)); };

      return (
        <div style={{background:"#fff",borderRadius:16,border:"1px solid #F0F0F0",overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.05)",transition:"all 0.2s ease"}}
          onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 8px 30px rgba(0,0,0,0.12)";e.currentTarget.style.transform="translateY(-3px)";}}
          onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 12px rgba(0,0,0,0.05)";e.currentTarget.style.transform="translateY(0)";}}>
          <div style={{height:180,background:images.length?"transparent":`linear-gradient(135deg,${catColor}15,${catColor}30)`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
            {images.length > 0
              ? <img src={images[safeIdx]} alt={item.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              : <span style={{fontSize:52,opacity:0.6}}>{CATEGORY_ICONS[item.category]||"📦"}</span>}

            {/* Carousel arrows */}
            {images.length > 1 && (
              <>
                <button onClick={prevImg} disabled={safeIdx===0}
                  style={{position:"absolute",left:6,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.45)",border:"none",borderRadius:"50%",width:28,height:28,color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:safeIdx===0?0.3:1,transition:"opacity 0.15s"}}>
                  ‹
                </button>
                <button onClick={nextImg} disabled={safeIdx===images.length-1}
                  style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.45)",border:"none",borderRadius:"50%",width:28,height:28,color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:safeIdx===images.length-1?0.3:1,transition:"opacity 0.15s"}}>
                  ›
                </button>
                {/* Counter */}
                <div style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,0.55)",color:"#fff",borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:700}}>
                  {safeIdx+1}/{images.length}
                </div>
                {/* Dots */}
                <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",display:"flex",gap:4}}>
                  {images.map((_,i)=>(
                    <div key={i} onClick={e=>{e.stopPropagation();setImgIdx(i);}}
                      style={{width:i===safeIdx?14:6,height:6,borderRadius:3,background:i===safeIdx?"#fff":"rgba(255,255,255,0.5)",transition:"all 0.2s",cursor:"pointer"}}/>
                  ))}
                </div>
              </>
            )}

            <div style={{position:"absolute",top:10,right:10,background:images.length?"rgba(0,0,0,0.55)":catColor,color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>

            </div>
          </div>
          <div style={{padding:"16px 18px 18px"}}>
            <div style={{fontWeight:700,fontSize:14,color:"#111",lineHeight:1.4,marginBottom:6,minHeight:38}}>{item.name}</div>

                  <span style={{background:"#EDE9FE",color:"#6D28D9",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>
