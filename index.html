  <script type="text/babel">
    const { useState, useMemo, useRef, useCallback, useEffect } = React;

    const app = firebase.initializeApp(FIREBASE_CONFIG);

    // ── eBay JSONP Search ──────────────────────────────────────
    function searchEbaySold(keywords) {
      return new Promise((resolve, reject) => {
        const cbName = "ebay_cb_" + Date.now();
        const script = document.createElement("script");
        const q = encodeURIComponent(keywords);
        script.src = [
          "https://svcs.ebay.com/services/search/FindingService/v1",
          "?OPERATION-NAME=findCompletedItems",
          "&SERVICE-VERSION=1.0.0",
          `&SECURITY-APPNAME=${EBAY_APP_ID}`,
          "&RESPONSE-DATA-FORMAT=JSON",
          `&callback=${cbName}`,
          "&REST-PAYLOAD",
          `&keywords=${q}`,
          "&itemFilter(0).name=SoldItemsOnly",
          "&itemFilter(0).value=true",
          "&paginationInput.entriesPerPage=20",
          "&sortOrder=EndTimeSoonest",
        ].join("");

        const cleanup = () => {
          delete window[cbName];
          if (script.parentNode) document.body.removeChild(script);
        };

        window[cbName] = (data) => {
          cleanup();
          try {
            const res = data.findCompletedItemsResponse[0];
            const items = res.searchResult[0].item || [];
            const parsed = items
              .filter(i => i.sellingStatus && i.sellingStatus[0].currentPrice)
              .map(i => ({
                title:  i.title[0],
                price:  parseFloat(i.sellingStatus[0].currentPrice[0].__value__),
                date:   i.listingInfo[0].endTime[0].slice(0, 10),
                url:    i.viewItemURL[0],
              }))
              .filter(i => !isNaN(i.price) && i.price > 0);
            resolve(parsed);
          } catch(e) { resolve([]); }
        };

        script.onerror = () => { cleanup(); reject(new Error("eBay API error")); };
        setTimeout(() => { cleanup(); reject(new Error("Timeout")); }, 10000);
        document.body.appendChild(script);
      });
    }

    // ── Price Tracker Modal ────────────────────────────────────
    function PriceTrackerModal({ item, onClose }) {
      const [status,  setStatus]  = useState("loading"); // loading | done | error
      const [sales,   setSales]   = useState([]);
      const [keyword, setKeyword] = useState(item.name);
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      const fetchPrices = useCallback(async (kw) => {
        setStatus("loading"); setSales([]);
        try {
          const data = await searchEbaySold(kw);
          setSales(data);
          setStatus(data.length > 0 ? "done" : "empty");
        } catch(e) {
          setStatus("error");
        }
      }, []);

      useEffect(() => { fetchPrices(item.name); }, []);

      useEffect(() => {
        if (status !== "done" || sales.length === 0 || !chartRef.current) return;
        if (chartInstance.current) chartInstance.current.destroy();

        const sorted = [...sales].sort((a,b) => a.date.localeCompare(b.date));
        const labels = sorted.map(s => s.date);
        const data   = sorted.map(s => s.price);
        const avg    = data.reduce((a,b)=>a+b,0)/data.length;

        chartInstance.current = new Chart(chartRef.current, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                label: "Sold Price (USD)",
                data,
                borderColor: "#111",
                backgroundColor: "rgba(17,17,17,0.06)",
                borderWidth: 2,
                pointBackgroundColor: "#111",
                pointRadius: 4,
                tension: 0.3,
                fill: true,
              },
              {
                label: "Avg",
                data: labels.map(()=>avg),
                borderColor: "#E8522A",
                borderWidth: 1.5,
                borderDash: [6,3],
                pointRadius: 0,
                fill: false,
              }
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: "top", labels: { font: { size: 11 }, boxWidth: 20 } },
              tooltip: {
                callbacks: {
                  label: ctx => `$${ctx.parsed.y.toFixed(0)}`,
                }
              }
            },
            scales: {
              x: { ticks: { font:{size:10}, maxTicksLimit: 8 }, grid:{display:false} },
              y: { ticks: { callback: v=>`$${v}`, font:{size:10} } },
            },
          },
        });
        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [status, sales]);

      const prices = sales.map(s=>s.price);
      const avg    = prices.length ? prices.reduce((a,b)=>a+b,0)/prices.length : 0;
      const high   = prices.length ? Math.max(...prices) : 0;
      const low    = prices.length ? Math.min(...prices) : 0;
      const myVal  = item.value || 0;
      const diff   = avg > 0 ? ((myVal - avg) / avg * 100) : 0;

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:20}}>
          <div style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:700,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>

            {/* Header */}
            <div style={{padding:"24px 28px 0",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:20}}>📊</span>
                  <span style={{fontSize:16,fontWeight:800,color:"#111"}}>eBay Market Price</span>
                </div>
                <div style={{fontSize:12,color:"#9CA3AF"}}>{item.name}</div>
              </div>
              <button onClick={onClose} style={{background:"#F3F4F6",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:"#6B7280",flexShrink:0}}>✕</button>
            </div>

            {/* Search bar */}
            <div style={{padding:"16px 28px 0",display:"flex",gap:8}}>
              <input
                value={keyword}
                onChange={e=>setKeyword(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&fetchPrices(keyword)}
                placeholder="Refine search…"
                style={{flex:1,padding:"9px 14px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,outline:"none"}}
                onFocus={e=>e.target.style.borderColor="#111"}
                onBlur={e=>e.target.style.borderColor="#E5E7EB"}
              />
              <button onClick={()=>fetchPrices(keyword)} style={{background:"#111",color:"#fff",border:"none",borderRadius:10,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                Search
              </button>
            </div>

            <div style={{padding:"20px 28px 28px"}}>
              {status === "loading" && (
                <div style={{textAlign:"center",padding:"40px 0",color:"#9CA3AF"}}>
                  <div style={{fontSize:32,marginBottom:8}} className="spinner">⏳</div>
                  <div style={{fontSize:13}}>Searching eBay sold listings…</div>
                </div>
              )}

              {status === "error" && (
                <div style={{textAlign:"center",padding:"40px 0",color:"#EF4444"}}>
                  <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
                  <div style={{fontSize:13,fontWeight:600}}>Failed to fetch eBay data</div>
                  <button onClick={()=>fetchPrices(keyword)} style={{marginTop:12,background:"#111",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,cursor:"pointer"}}>Retry</button>
                </div>
              )}

              {status === "empty" && (
                <div style={{textAlign:"center",padding:"40px 0",color:"#9CA3AF"}}>
                  <div style={{fontSize:32,marginBottom:8}}>🔍</div>
                  <div style={{fontSize:13}}>No sold listings found. Try a shorter keyword.</div>
                </div>
              )}

              {status === "done" && sales.length > 0 && (
                <>
                  {/* Stats row */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
                    {[
                      {label:"Avg Price",  value:`$${avg.toFixed(0)}`,  color:"#111"},
                      {label:"Highest",    value:`$${high.toFixed(0)}`, color:"#16A34A"},
                      {label:"Lowest",     value:`$${low.toFixed(0)}`,  color:"#E8522A"},
                      {label:"vs My Value",value:`${diff>=0?"+":""}${diff.toFixed(0)}%`, color:diff>=0?"#16A34A":"#E8522A"},
                    ].map(s=>(
                      <div key={s.label} style={{background:"#F8F8F8",borderRadius:12,padding:"12px 14px",textAlign:"center"}}>
                        <div style={{fontSize:10,fontWeight:600,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:0.6,marginBottom:4}}>{s.label}</div>
                        <div style={{fontSize:18,fontWeight:800,color:s.color}}>{s.value}</div>
                      </div>
                    ))}
                  </div>

                  {/* Chart */}
                  <div style={{height:220,marginBottom:20,background:"#FAFAFA",borderRadius:12,padding:"12px"}}>
                    <canvas ref={chartRef}/>
                  </div>

                  {/* Recent sales list */}
                  <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10,textTransform:"uppercase",letterSpacing:0.6}}>
                    Recent Sales ({sales.length})
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {sales.slice(0,15).map((s,i)=>(
                      <a key={i} href={s.url} target="_blank" rel="noopener noreferrer"
                        style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,border:"1px solid #F0F0F0",textDecoration:"none",color:"inherit",transition:"background 0.15s"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#F8F8F8"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                      >
                        <div style={{flex:1,fontSize:12,color:"#374151",marginRight:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</div>
                        <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
                          <span style={{fontSize:11,color:"#9CA3AF"}}>{s.date}</span>
                          <span style={{fontSize:14,fontWeight:800,color:"#111",minWidth:60,textAlign:"right"}}>${s.price.toFixed(0)}</span>
                        </div>
                      </a>
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Insights Modal ─────────────────────────────────────────
    function InsightsModal({ items, seriesList, allCats, isAdmin, onClose, onAddSeries, onDeleteSeries }) {
      const [tab, setTab] = useState("spending"); // spending | series
      const pieRef  = useRef(null);
      const pieInst = useRef(null);

      const COLORS = ["#E8522A","#F5C518","#2563EB","#16A34A","#9333EA","#EC4899"];
      const CAT_COLORS = { "NBA Card":"#E8522A","Pokemon Card":"#F5C518","Jersey":"#2563EB","Toy":"#16A34A","Other":"#9333EA" };

      // Spending stats
      const spendingByCat = useMemo(() => {
        const map = {};
        items.forEach(i => {
          if (!map[i.category]) map[i.category] = 0;
          map[i.category] += i.value || 0;
        });
        return Object.entries(map).sort((a,b)=>b[1]-a[1]);
      }, [items]);
      const totalSpend = spendingByCat.reduce((s,[,v])=>s+v, 0);

      // Pie chart
      useEffect(() => {
        if (tab !== "spending" || !pieRef.current || spendingByCat.length === 0) return;
        if (pieInst.current) pieInst.current.destroy();
        pieInst.current = new Chart(pieRef.current, {
          type: "doughnut",
          data: {
            labels: spendingByCat.map(([k])=>k),
            datasets: [{
              data: spendingByCat.map(([,v])=>v),
              backgroundColor: spendingByCat.map(([k])=>CAT_COLORS[k]||"#9CA3AF"),
              borderWidth: 2,
              borderColor: "#fff",
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: "65%",
            plugins: {
              legend: { position:"right", labels:{ font:{size:11}, boxWidth:14, padding:12 } },
              tooltip: { callbacks: { label: ctx => ` $${ctx.parsed.toLocaleString()} (${((ctx.parsed/totalSpend)*100).toFixed(0)}%)` } },
            },
          },
        });
        return () => { if (pieInst.current) pieInst.current.destroy(); };
      }, [tab, spendingByCat]);

      // Series completion
      const seriesStats = useMemo(() => {
        return seriesList.map(s => {
          const owned = items.filter(i => i.series === s.name).length;
          const pct   = s.total > 0 ? Math.min(100, Math.round(owned / s.total * 100)) : 0;
          return { ...s, owned, pct };
        }).sort((a,b) => b.pct - a.pct);
      }, [seriesList, items]);

      // Add series form
      const [newName,  setNewName]  = useState("");
      const [newTotal, setNewTotal] = useState("");
      const [newCat,   setNewCat]   = useState("Pokemon Card");
      const [adding,   setAdding]   = useState(false);

      const handleAddSeries = async () => {
        if (!newName.trim() || !newTotal) return;
        setAdding(true);
        await onAddSeries({ name: newName.trim(), total: parseInt(newTotal), category: newCat });
        setNewName(""); setNewTotal(""); setAdding(false);
      };

      const CATS = allCats ? allCats.filter(c=>c!=="All") : DEFAULT_CATS;

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:20}}>
          <div style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:760,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>

            {/* Header */}
            <div style={{padding:"24px 28px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>📈</span>
                <span style={{fontSize:18,fontWeight:800,color:"#111"}}>Data Insights</span>
              </div>
              <button onClick={onClose} style={{background:"#F3F4F6",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:"#6B7280"}}>✕</button>
            </div>

            {/* Tabs */}
            <div style={{padding:"16px 28px 0",display:"flex",gap:8}}>
              {[["spending","💸 Spending"],["series","🏆 Series"]].map(([k,label])=>(
                <button key={k} onClick={()=>setTab(k)} style={{padding:"8px 20px",borderRadius:20,fontSize:13,fontWeight:600,cursor:"pointer",border:tab===k?"2px solid #111":"1.5px solid #E5E7EB",background:tab===k?"#111":"#fff",color:tab===k?"#fff":"#6B7280"}}>
                  {label}
                </button>
              ))}
            </div>

            <div style={{padding:"20px 28px 28px"}}>

              {/* ── SPENDING TAB ── */}
              {tab === "spending" && (
                <>
                  {items.length === 0 ? (
                    <div style={{textAlign:"center",padding:"40px 0",color:"#9CA3AF"}}>
                      <div style={{fontSize:36,marginBottom:8}}>💸</div>
                      <div style={{fontSize:13}}>Add some items to see spending stats!</div>
                    </div>
                  ) : (
                    <>
                      {/* Total */}
                      <div style={{textAlign:"center",marginBottom:20}}>
                        <div style={{fontSize:12,fontWeight:600,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Total Collection Value</div>
                        <div style={{fontSize:36,fontWeight:900,color:"#111",letterSpacing:-1}}>${totalSpend.toLocaleString()}</div>
                        <div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>{items.length} items across {spendingByCat.length} categories</div>
                      </div>

                      {/* Donut chart */}
                      <div style={{height:220,marginBottom:24}}>
                        <canvas ref={pieRef}/>
                      </div>

                      {/* Category breakdown bars */}
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        {spendingByCat.map(([cat, val], i) => {
                          const pct = totalSpend > 0 ? (val/totalSpend*100) : 0;
                          const col = CAT_COLORS[cat] || COLORS[i % COLORS.length];
                          const count = items.filter(it=>it.category===cat).length;
                          return (
                            <div key={cat} style={{background:"#F8F8F8",borderRadius:12,padding:"14px 16px"}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                                <div style={{display:"flex",alignItems:"center",gap:8}}>
                                  <div style={{width:10,height:10,borderRadius:"50%",background:col,flexShrink:0}}/>
                                  <span style={{fontSize:13,fontWeight:700,color:"#111"}}>{cat}</span>
                                  <span style={{fontSize:11,color:"#9CA3AF"}}>{count} items</span>
                                </div>
                                <div style={{textAlign:"right"}}>
                                  <span style={{fontSize:15,fontWeight:800,color:"#111"}}>${val.toLocaleString()}</span>
                                  <span style={{fontSize:11,color:"#9CA3AF",marginLeft:6}}>{pct.toFixed(0)}%</span>
                                </div>
                              </div>
                              <div style={{height:6,background:"#E5E7EB",borderRadius:10,overflow:"hidden"}}>
                                <div style={{height:"100%",width:`${pct}%`,background:col,borderRadius:10,transition:"width 0.6s ease"}}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      {/* Fun insight */}
                      {spendingByCat.length > 0 && (
                        <div style={{marginTop:16,padding:"14px 18px",background:"#FFF7ED",borderRadius:12,border:"1px solid #FED7AA"}}>
                          <span style={{fontSize:13,color:"#C2410C"}}>
                            🔥 你最大洗費係 <strong>{spendingByCat[0][0]}</strong>，佔總值 <strong>{(spendingByCat[0][1]/totalSpend*100).toFixed(0)}%</strong>！
                          </span>
                        </div>
                      )}
                    </>
                  )}
                </>
              )}

              {/* ── SERIES TAB ── */}
              {tab === "series" && (
                <>
                  {/* Add series form (admin only) */}
                  {isAdmin && (
                    <div style={{background:"#F8F8F8",borderRadius:14,padding:"16px",marginBottom:20}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:12,textTransform:"uppercase",letterSpacing:0.5}}>+ Add New Series</div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Series name (e.g. Pokemon 151 White)"
                          style={{flex:"2 1 160px",padding:"9px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,outline:"none"}}
                          onFocus={e=>e.target.style.borderColor="#111"} onBlur={e=>e.target.style.borderColor="#E5E7EB"}/>
                        <input value={newTotal} onChange={e=>setNewTotal(e.target.value)} placeholder="Total cards" type="number" min="1"
                          style={{flex:"1 1 100px",padding:"9px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,outline:"none"}}
                          onFocus={e=>e.target.style.borderColor="#111"} onBlur={e=>e.target.style.borderColor="#E5E7EB"}/>
                        <select value={newCat} onChange={e=>setNewCat(e.target.value)}
                          style={{flex:"1 1 120px",padding:"9px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,background:"#fff"}}>
                          {CATS.map(c=><option key={c}>{c}</option>)}
                        </select>
                        <button onClick={handleAddSeries} disabled={adding||!newName||!newTotal} style={{padding:"9px 18px",background:"#111",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:adding?"not-allowed":"pointer",opacity:adding||!newName||!newTotal?0.5:1}}>
                          {adding?"Adding…":"Add"}
                        </button>
                      </div>
                    </div>
                  )}

                  {seriesStats.length === 0 ? (
                    <div style={{textAlign:"center",padding:"40px 0",color:"#9CA3AF"}}>
                      <div style={{fontSize:36,marginBottom:8}}>🏆</div>
                      <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>No series yet!</div>
                      <div style={{fontSize:12}}>{isAdmin ? "Add a series above to start tracking completion." : "Admin hasn't set up any series yet."}</div>
                    </div>
                  ) : (
                    <div style={{display:"flex",flexDirection:"column",gap:12}}>
                      {seriesStats.map(s => {
                        const col = CAT_COLORS[s.category] || "#6B7280";
                        const isComplete = s.pct >= 100;
                        return (
                          <div key={s.id} style={{background:isComplete?"#F0FDF4":"#fff",borderRadius:14,border:`1px solid ${isComplete?"#BBF7D0":"#F0F0F0"}`,padding:"16px 18px",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                              <div>
                                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                                  {isComplete && <span style={{fontSize:14}}>🎉</span>}
                                  <span style={{fontSize:14,fontWeight:800,color:"#111"}}>{s.name}</span>
                                </div>
                                <div style={{fontSize:11,color:"#9CA3AF"}}>{s.category}</div>
                              </div>
                              <div style={{textAlign:"right",display:"flex",alignItems:"center",gap:10}}>
                                <div>

    function compressImage(dataUrl, maxWidth = 600, quality = 0.78) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = dataUrl;
      });
    }

    // ── Background Modal ───────────────────────────────────────
    function BackgroundModal({ current, onSave, onRemove, onClose }) {
      const [preview, setPreview] = useState(current?.image || null);
      const [overlay, setOverlay] = useState(current?.overlay ?? 0.25);
      const [blur,    setBlur]    = useState(current?.blur ?? 0);
      const [saving,  setSaving]  = useState(false);
      const inputRef  = useRef(null);
      const [dragging,setDragging]= useState(false);
      const [compressing,setCompressing] = useState(false);

      const processFile = useCallback(async (file) => {
        if (!file || !file.type.startsWith("image/")) return;
        setCompressing(true);
        const reader = new FileReader();
        reader.onload = async (e) => {
          // Compress for background use: wider max, lower quality
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            const maxW = 1400;
            if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            const compressed = canvas.toDataURL("image/jpeg", 0.65);
            setPreview(compressed);
            setCompressing(false);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }, []);

      const handleSave = async () => {
        if (!preview) return;
        setSaving(true);
        await onSave({ image: preview, overlay, blur });
        setSaving(false);
        onClose();
      };

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:20}}>

              <div style={{display:"flex",alignItems:"center",gap:10}}>

                <span style={{fontSize:18,fontWeight:800,color:"#111"}}>Background Image</span>
              </div>
              <button onClick={onClose} style={{background:"#F3F4F6",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:"#6B7280"}}>✕</button>
            </div>

            <div style={{padding:"0 28px 28px"}}>

              {/* Upload zone */}
              {preview ? (
                <div style={{position:"relative",borderRadius:14,overflow:"hidden",height:200,marginBottom:20,boxShadow:"0 4px 20px rgba(0,0,0,0.12)"}}>
                  <img src={preview} alt="bg preview" style={{width:"100%",height:"100%",objectFit:"cover",filter:`blur(${blur}px)`}}/>
                  <div style={{position:"absolute",inset:0,background:`rgba(0,0,0,${overlay})`}}/>
                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                    <button onClick={()=>inputRef.current.click()} style={{background:"rgba(255,255,255,0.9)",border:"none",borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",color:"#111"}}>Change Photo</button>
                    <button onClick={()=>setPreview(null)} style={{background:"rgba(220,38,38,0.85)",border:"none",borderRadius:10,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",color:"#fff"}}>Remove</button>
                  </div>
                </div>
              ) : (
                <div onClick={()=>inputRef.current.click()}
                  onDragOver={e=>{e.preventDefault();setDragging(true);}}
                  onDragLeave={()=>setDragging(false)}
                  onDrop={e=>{e.preventDefault();setDragging(false);processFile(e.dataTransfer.files[0]);}}
                  style={{border:`2px dashed ${dragging?"#111":"#D1D5DB"}`,borderRadius:14,height:160,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:dragging?"#F9F9F9":"#FAFAFA",gap:10,marginBottom:20}}>
                  {compressing
                    ? <><span style={{fontSize:28}} className="spinner">⏳</span><div style={{fontSize:13,color:"#9CA3AF"}}>Compressing…</div></>
                    : <><span style={{fontSize:36}}>🖼️</span><div style={{fontSize:14,fontWeight:600,color:"#374151"}}>Click to upload or drag & drop</div><div style={{fontSize:12,color:"#9CA3AF"}}>JPG, PNG, WEBP — recommended landscape</div></>
                  }
                </div>
              )}
              <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>

              {/* Controls */}
              {preview && (
                <>
                  <div style={{marginBottom:18}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <label style={{fontSize:13,fontWeight:600,color:"#374151"}}>Dark Overlay</label>
                      <span style={{fontSize:12,color:"#9CA3AF",fontWeight:600}}>{Math.round(overlay*100)}%</span>
                    </div>
                    <input type="range" min="0" max="0.75" step="0.05" value={overlay}
                      onChange={e=>setOverlay(parseFloat(e.target.value))}
                      style={{width:"100%",accentColor:"#111"}}/>
                    <div style={{fontSize:11,color:"#9CA3AF",marginTop:4}}>Higher overlay makes text easier to read over the background</div>
                  </div>

                  <div style={{marginBottom:22}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <label style={{fontSize:13,fontWeight:600,color:"#374151"}}>Background Blur</label>
                      <span style={{fontSize:12,color:"#9CA3AF",fontWeight:600}}>{blur}px</span>

                    <input type="range" min="0" max="20" step="1" value={blur}

              {/* Buttons */}

                  {saving?"Saving…":"✓ Apply Background"}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

                {isAdmin && <>

                  <button onClick={e=>{e.stopPropagation();onDelete(item.id);}} style={{background:"#FEF2F2",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,color:"#DC2626",cursor:"pointer",fontWeight:500}}>✕</button>

    function ImageUploader({ value, onChange }) {
      const inputRef = useRef(null);
      const [dragging, setDragging] = useState(false);
      const [compressing, setCompressing] = useState(false);

      const processFile = useCallback(async (file) => {
        if (!file || !file.type.startsWith("image/")) return;
        setCompressing(true);
        const reader = new FileReader();
        reader.onload = async (e) => {
          const compressed = await compressImage(e.target.result);
          onChange(compressed);
          setCompressing(false);
        };
        reader.readAsDataURL(file);
      }, [onChange]);

      return (
        <div style={{marginBottom:20}}>
          <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:8}}>Photo</label>
          {value ? (
            <div style={{position:"relative",borderRadius:12,overflow:"hidden",height:180,background:"#F3F4F6"}}>
              <img src={value} alt="preview" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,transition:"background 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(0,0,0,0.45)"}
                onMouseLeave={e=>e.currentTarget.style.background="rgba(0,0,0,0)"}>
                <button onClick={()=>inputRef.current.click()} style={{background:"rgba(255,255,255,0.9)",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",color:"#111"}}>Change</button>
                <button onClick={()=>onChange(null)} style={{background:"rgba(220,38,38,0.85)",border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",color:"#fff"}}>Remove</button>
              </div>
            </div>
          ) : (
            <div onClick={()=>inputRef.current.click()}
              onDragOver={e=>{e.preventDefault();setDragging(true);}}
              onDragLeave={()=>setDragging(false)}
              onDrop={e=>{e.preventDefault();setDragging(false);processFile(e.dataTransfer.files[0]);}}
              style={{border:`2px dashed ${dragging?"#111":"#D1D5DB"}`,borderRadius:12,height:140,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:dragging?"#F9F9F9":"#FAFAFA",gap:8}}>
              {compressing
                ? <><span style={{fontSize:24}}>⏳</span><div style={{fontSize:13,color:"#9CA3AF"}}>Compressing…</div></>
                : <><span style={{fontSize:32}}>🖼️</span><div style={{fontSize:13,fontWeight:600,color:"#374151"}}>Click to upload or drag & drop</div><div style={{fontSize:11,color:"#9CA3AF"}}>JPG, PNG, WEBP</div></>
              }
            </div>
          )}
          <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>processFile(e.target.files[0])}/>
        </div>
      );
    }

    function Modal({ item, seriesList, allCats, subcategories, onSave, onClose }) {
      const [form, setForm] = useState(item || {name:"",category:"NBA Card",condition:"Near Mint",value:"",year:new Date().getFullYear(),notes:"",image:null,series:"",subcategory:""});
      const [saving, setSaving] = useState(false);
      const handleChange = (k,v) => setForm(f=>({...f,[k]:v}));

      // Reset subcategory when category changes
      const handleCatChange = (v) => setForm(f=>({...f, category:v, subcategory:""}));

      // Subcats available for the currently selected category
      const availableSubcats = useMemo(() =>
        (subcategories||[]).filter(s => s.category === form.category),
        [subcategories, form.category]
      );

      const handleSave = async () => {
        if (!form.name || !form.value) return alert("Please fill in name and value.");
        setSaving(true);
        await onSave({...form, value:parseFloat(form.value), year:parseInt(form.year)||new Date().getFullYear()});
        setSaving(false);
      };

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
          <div style={{background:"#fff",borderRadius:20,padding:32,width:"100%",maxWidth:480,boxShadow:"0 20px 60px rgba(0,0,0,0.15)",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
              <h2 style={{margin:0,fontSize:20,fontWeight:800,color:"#111"}}>{item&&item.id?"Edit Item":"Add New Item"}</h2>

            </div>
            <ImageUploader value={form.image} onChange={v=>handleChange("image",v)}/>
            {[{label:"Item Name",key:"name",type:"text",placeholder:"e.g. Kobe Bryant RC"},

              {label:"Value (USD)",key:"value",type:"number",placeholder:"e.g. 500"},
              {label:"Notes",key:"notes",type:"text",placeholder:"e.g. PSA 9, Holo"}

              <div key={f.key} style={{marginBottom:16}}>
                <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:6}}>{f.label}</label>
                <input type={f.type} value={form[f.key]||""} placeholder={f.placeholder}
                  onChange={e=>handleChange(f.key,e.target.value)}
                  style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:14,outline:"none",boxSizing:"border-box"}}
                  onFocus={e=>e.target.style.borderColor="#111"} onBlur={e=>e.target.style.borderColor="#E5E7EB"}/>
              </div>
            ))}
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:6}}>Category</label>
              <select value={form.category} onChange={e=>handleCatChange(e.target.value)}
                style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:14,background:"#fff",cursor:"pointer"}}>
                {(allCats||[...DEFAULT_CATS,"Other"]).filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}
              </select>
            </div>

            {availableSubcats.length > 0 && (
              <div style={{marginBottom:16}}>
                <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:6}}>
                  Subcategory <span style={{fontWeight:400,color:"#9CA3AF"}}>(optional)</span>
                </label>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  <button type="button" onClick={()=>handleChange("subcategory","")}
                    style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:!form.subcategory?"2px solid #111":"1.5px solid #E5E7EB",background:!form.subcategory?"#111":"#fff",color:!form.subcategory?"#fff":"#6B7280"}}>
                    None
                  </button>
                  {availableSubcats.map(s=>(
                    <button key={s.id} type="button" onClick={()=>handleChange("subcategory",s.name)}
                      style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:form.subcategory===s.name?"2px solid #111":"1.5px solid #E5E7EB",background:form.subcategory===s.name?"#111":"#fff",color:form.subcategory===s.name?"#fff":"#6B7280"}}>
                      {s.name}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:6}}>Condition</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {CONDITIONS.map(c=>(
                  <button key={c} onClick={()=>handleChange("condition",c)} style={{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:form.condition===c?"2px solid #111":"1.5px solid #E5E7EB",background:form.condition===c?"#111":"#fff",color:form.condition===c?"#fff":"#374151"}}>{c}</button>
                ))}
              </div>
            </div>
            {seriesList && seriesList.length > 0 && (
              <div style={{marginBottom:24}}>
                <label style={{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:6}}>Series <span style={{fontWeight:400,color:"#9CA3AF"}}>(optional)</span></label>
                <select value={form.series||""} onChange={e=>handleChange("series",e.target.value)}
                  style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:14,background:"#fff",cursor:"pointer"}}>
                  <option value="">— None —</option>
                  {seriesList.map(s=><option key={s.id} value={s.name}>{s.name} ({s.category})</option>)}
                </select>
              </div>
            )}
            <button onClick={handleSave} disabled={saving} style={{width:"100%",padding:"13px",background:saving?"#666":"#111",color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:saving?"not-allowed":"pointer"}}>
              {saving ? "Saving…" : (item&&item.id?"Save Changes":"Add to Collection")}
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const [items,        setItems]        = useState([]);
      const [seriesList,   setSeriesList]   = useState([]);
      const [customCats,   setCustomCats]   = useState([]);
      const [subcategories,setSubcategories]= useState([]);
      const [bgSettings,   setBgSettings]   = useState(null);
      const [loading,      setLoading]      = useState(true);
      const [isAdmin,      setIsAdmin]      = useState(false);
      const [showPwModal,  setShowPwModal]  = useState(false);
      const [showInsights, setShowInsights] = useState(false);
      const [showCatModal, setShowCatModal] = useState(false);
      const [showBgModal,  setShowBgModal]  = useState(false);
      const [selectedCat,  setSelectedCat]  = useState("All");
      const [selectedSubcat,setSelectedSubcat]= useState("All");
      const [search,       setSearch]       = useState("");
      const [sortBy,       setSortBy]       = useState("dateAdded");
      const [sortDir,      setSortDir]      = useState("desc");
      const [modal,        setModal]        = useState(null);
      const [viewMode,     setViewMode]     = useState("grid");
      const [priceItem,    setPriceItem]    = useState(null);

      useEffect(() => {
        const unsub = db.collection(ITEMS_COL)
          .orderBy("dateAdded","desc")
          .onSnapshot(snap => {
            setItems(snap.docs.map(d=>({id:d.id,...d.data()})));
            setLoading(false);
          }, err => { console.error(err); setLoading(false); });
        return unsub;
      }, []);

      useEffect(() => {
        const unsub = db.collection(SETTINGS_COL).doc("background")
          .onSnapshot(snap => {
            setBgSettings(snap.exists ? snap.data() : null);
          }, err => console.error(err));
        return unsub;
      }, []);

      const handleSaveBg = async (data) => {
        await db.collection(SETTINGS_COL).doc("background").set(data);
      };
      const handleRemoveBg = async () => {
        await db.collection(SETTINGS_COL).doc("background").delete();
      };

      useEffect(() => {
        const unsub = db.collection(SERIES_COL)
          .onSnapshot(snap => {
            setSeriesList(snap.docs.map(d=>({id:d.id,...d.data()})));
          }, err => console.error(err));
        return unsub;
      }, []);

      useEffect(() => {
        const unsub = db.collection(CATEGORIES_COL)
          .orderBy("createdAt","asc")
          .onSnapshot(snap => {
            const cats = snap.docs.map(d=>({id:d.id,...d.data()}));
            setCustomCats(cats);
            // Sync into shared lookup objects so all components pick them up
            cats.forEach(c => {
              CATEGORY_COLORS[c.name] = c.color;
              CATEGORY_ICONS[c.name]  = c.icon;
            });
          }, err => console.error(err));
        return unsub;
      }, []);

      const allCategories = useMemo(() => {
        const customNames = customCats.map(c=>c.name).filter(n=>!DEFAULT_CATS.includes(n));
        return ["All", ...DEFAULT_CATS, ...customNames];
      }, [customCats]);

      const handleAddCat = async (data) => {
        await db.collection(CATEGORIES_COL).add(data);
      };
      const handleDeleteCat = async (id, name) => {
        if (window.confirm(`Delete "${name}"? Items in this category won't be deleted.`)) {
          await db.collection(CATEGORIES_COL).doc(id).delete();
          delete CATEGORY_COLORS[name];
          delete CATEGORY_ICONS[name];
        }
      };

      useEffect(() => {
        const unsub = db.collection(SUBCATS_COL)
          .orderBy("createdAt","asc")
          .onSnapshot(snap => {
            setSubcategories(snap.docs.map(d=>({id:d.id,...d.data()})));
          }, err => console.error(err));
        return unsub;
      }, []);

      const handleAddSubcat = async (data) => {
        await db.collection(SUBCATS_COL).add(data);
      };
      const handleDeleteSubcat = async (id) => {
        await db.collection(SUBCATS_COL).doc(id).delete();
      };

      // When category changes, reset subcategory filter
      useEffect(() => { setSelectedSubcat("All"); }, [selectedCat]);

      // Subcats for the currently selected category
      const currentSubcats = useMemo(() =>
        subcategories.filter(s => s.category === selectedCat),
        [subcategories, selectedCat]
      );

      const handleAddSeries = async (data) => {
        await db.collection(SERIES_COL).add(data);
      };

      const handleDeleteSeries = async (id) => {
        await db.collection(SERIES_COL).doc(id).delete();
      };

      const handleSave = async (form) => {
        const data = {...form};
        delete data.id;
        if (form.id) {
          await db.collection(ITEMS_COL).doc(form.id).set(data);
        } else {
          await db.collection(ITEMS_COL).add({...data, dateAdded: new Date().toISOString().slice(0,10)});
        }
        setModal(null);
      };

      const handleDelete = async (id) => {
        if (window.confirm("Remove this item?")) {
          await db.collection(ITEMS_COL).doc(id).delete();
        }
      };

      const filtered = useMemo(() => {
        let arr = items;
        if (selectedCat !== "All") arr = arr.filter(i=>i.category===selectedCat);
        if (selectedSubcat !== "All") arr = arr.filter(i=>i.subcategory===selectedSubcat);
        if (search.trim()) {
          const s = search.toLowerCase();
          arr = arr.filter(i=>i.name.toLowerCase().includes(s)||(i.notes&&i.notes.toLowerCase().includes(s))||String(i.year).includes(s));
        }
        return [...arr].sort((a,b)=>{
          let va=a[sortBy],vb=b[sortBy];
          if (typeof va==="string"){va=va.toLowerCase();vb=vb.toLowerCase();}
          if (va<vb) return sortDir==="asc"?-1:1;
          if (va>vb) return sortDir==="asc"?1:-1;
          return 0;
        });
      }, [items,selectedCat,selectedSubcat,search,sortBy,sortDir]);

      const stats = useMemo(() => {
        const totalValue = items.reduce((s,i)=>s+i.value,0);
        const byCat = {};
        allCategories.filter(c=>c!=="All").forEach(c=>{
          const ci=items.filter(i=>i.category===c);
          byCat[c]={count:ci.length,value:ci.reduce((s,i)=>s+i.value,0)};
        });
        const topItem = items.length?items.reduce((a,b)=>a.value>b.value?a:b):null;
        return {totalValue,byCat,topItem,total:items.length};
      }, [items, allCategories]);

      const bgStyle = bgSettings?.image ? {
        backgroundImage: `url(${bgSettings.image})`,
        backgroundSize: "cover",
        backgroundPosition: "center",
        backgroundAttachment: "fixed",
        filter: bgSettings.blur ? `blur(${bgSettings.blur}px)` : "none",
      } : {};

      return (
        <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",minHeight:"100vh",color:"#111",position:"relative"}}>

          {/* Background layer */}
          {bgSettings?.image && (
            <div style={{position:"fixed",inset:0,zIndex:0,backgroundImage:`url(${bgSettings.image})`,backgroundSize:"cover",backgroundPosition:"center",filter:bgSettings.blur?`blur(${bgSettings.blur+4}px)`:"none",transform:"scale(1.05)"}}/>
          )}
          {bgSettings?.image && bgSettings.overlay > 0 && (
            <div style={{position:"fixed",inset:0,zIndex:1,background:`rgba(0,0,0,${bgSettings.overlay})`}}/>
          )}

          {/* All content sits above background */}
          <div style={{position:"relative",zIndex:2}}>

          {/* Header */}
          <div style={{background:bgSettings?.image?"rgba(255,255,255,0.88)":"#fff",backdropFilter:bgSettings?.image?"blur(12px)":"none",borderBottom:"1px solid rgba(240,240,240,0.8)",position:"sticky",top:0,zIndex:100}}>
            <div style={{maxWidth:1200,margin:"0 auto",padding:"0 24px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:64}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:36,height:36,background:"#111",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏆</div>
                  <div>
                    <div style={{fontWeight:800,fontSize:17,letterSpacing:-0.3}}>My Collection</div>
                    <div style={{fontSize:11,color:"#9CA3AF",fontWeight:500,marginTop:-2}}>Vasco's Collection Vault</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <button onClick={()=>setShowInsights(true)} style={{background:"#F3F4F6",color:"#374151",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                    📈 Insights
                  </button>
                  {isAdmin ? (
                    <>
                      <button onClick={()=>setShowBgModal(true)} style={{background:"#F3F4F6",color:"#374151",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}} title="Change background">
                        🖼️
                      </button>
                      <button onClick={()=>setModal("add")} style={{background:"#111",color:"#fff",border:"none",borderRadius:10,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:16}}>+</span> Add Item
                      </button>
                      <button onClick={()=>setIsAdmin(false)} style={{background:"#F3F4F6",color:"#374151",border:"none",borderRadius:10,padding:"9px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                        🔓 Logout
                      </button>
                    </>
                  ) : (
                    <button onClick={()=>setShowPwModal(true)} style={{background:"#F3F4F6",color:"#374151",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
                      🔐 Admin Login
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>

          <div style={{maxWidth:1200,margin:"0 auto",padding:"28px 24px",background:bgSettings?.image?"transparent":undefined}}>
            {loading ? (
              <div style={{textAlign:"center",padding:"80px 20px",color:"#9CA3AF"}}>
                <div style={{fontSize:40,marginBottom:12}} className="spinner">⏳</div>
                <div style={{fontSize:15,fontWeight:600}}>Loading collection…</div>
              </div>

              <>
                {/* Stats */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:28}}>
                  {[
                    {label:"Total Items",value:stats.total,sub:"in collection",icon:"📦",color:"#111"},
                    {label:"Portfolio Value",value:formatCurrency(stats.totalValue),sub:"estimated",icon:"💰",color:"#16A34A"},
                    {label:"Top Item",value:stats.topItem?stats.topItem.name.slice(0,22)+(stats.topItem.name.length>22?"…":""):"—",sub:stats.topItem?formatCurrency(stats.topItem.value):"",icon:"⭐",color:"#E8522A"},
                    {label:"Categories",value:allCategories.filter(c=>c!=="All"&&stats.byCat[c]&&stats.byCat[c].count>0).length,sub:"active",icon:"🗂️",color:"#2563EB"},
                  ].map(s=>(
                    <div key={s.label} style={{background:"#fff",borderRadius:16,padding:"20px 22px",border:"1px solid #F0F0F0",boxShadow:"0 1px 8px rgba(0,0,0,0.04)"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                        <span style={{fontSize:11,fontWeight:600,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:0.8}}>{s.label}</span>
                        <span style={{fontSize:20}}>{s.icon}</span>
                      </div>
                      <div style={{fontSize:26,fontWeight:800,color:s.color,letterSpacing:-1,lineHeight:1}}>{s.value}</div>
                      {s.sub&&<div style={{fontSize:12,color:"#9CA3AF",marginTop:4,fontWeight:500}}>{s.sub}</div>}
                    </div>
                  ))}
                </div>

                {/* Breakdown */}
                <div style={{background:"#fff",borderRadius:16,padding:"20px 22px",border:"1px solid #F0F0F0",marginBottom:28,boxShadow:"0 1px 8px rgba(0,0,0,0.04)"}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#111",marginBottom:14}}>Collection Breakdown</div>
                  <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                    {allCategories.filter(c=>c!=="All").map(c=>{
                      const d=stats.byCat[c];
                      if (!d||d.count===0) return null;
                      const pct=stats.total>0?Math.round((d.count/stats.total)*100):0;
                      return (
                        <div key={c} style={{flex:"1 1 140px",minWidth:120}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                            <div style={{fontSize:12,fontWeight:600,color:"#374151",display:"flex",alignItems:"center",gap:5}}><span>{CATEGORY_ICONS[c]||"📦"}</span>{c}</div>
                            <span style={{fontSize:11,color:"#9CA3AF"}}>{d.count} items</span>
                          </div>
                          <div style={{height:5,background:"#F3F4F6",borderRadius:10,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${pct}%`,background:CATEGORY_COLORS[c]||"#6B7280",borderRadius:10}}/>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                            <span style={{fontSize:11,color:"#9CA3AF"}}>{pct}%</span>
                            <span style={{fontSize:11,fontWeight:700,color:CATEGORY_COLORS[c]||"#6B7280"}}>{formatCurrency(d.value)}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Filters */}
                <div style={{display:"flex",gap:12,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
                  <div style={{position:"relative",flex:"1 1 240px",minWidth:200}}>
                    <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#9CA3AF"}}>🔍</span>
                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, notes, year…"
                      style={{width:"100%",padding:"10px 14px 10px 36px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,background:"#fff",outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <select value={`${sortBy}-${sortDir}`} onChange={e=>{const p=e.target.value.split("-");const dir=p.pop();setSortBy(p.join("-"));setSortDir(dir);}}
                    style={{padding:"10px 14px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,background:"#fff",cursor:"pointer",outline:"none"}}>
                    <option value="value-desc">Value: High → Low</option>
                    <option value="value-asc">Value: Low → High</option>
                    <option value="name-asc">Name: A → Z</option>
                    <option value="dateAdded-desc">Newest First</option>
                    <option value="year-desc">Year: Newest</option>
                    <option value="year-asc">Year: Oldest</option>
                  </select>
                  <div style={{display:"flex",background:"#F3F4F6",borderRadius:10,padding:3,gap:2}}>
                    {[["grid","⊞"],["list","☰"]].map(([v,icon])=>(
                      <button key={v} onClick={()=>setViewMode(v)} style={{background:viewMode===v?"#fff":"transparent",border:"none",borderRadius:8,padding:"6px 12px",fontSize:14,cursor:"pointer",color:viewMode===v?"#111":"#9CA3AF",boxShadow:viewMode===v?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>{icon}</button>
                    ))}
                  </div>
                </div>

                {/* Category Tabs */}
                <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
                  {allCategories.map(c=>{
                    const count=c==="All"?items.length:(stats.byCat[c]?stats.byCat[c].count:0);
                    const active=selectedCat===c;
                    return (
                      <button key={c} onClick={()=>setSelectedCat(c)} style={{padding:"7px 16px",borderRadius:20,fontSize:13,fontWeight:600,border:active?"2px solid #111":"1.5px solid #E5E7EB",background:active?"#111":"#fff",color:active?"#fff":"#6B7280",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                        <span>{CATEGORY_ICONS[c]||"📦"}</span>{c}
                        <span style={{background:active?"rgba(255,255,255,0.2)":"#F3F4F6",color:active?"#fff":"#9CA3AF",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>{count}</span>
                      </button>
                    );
                  })}
                  {isAdmin && (
                    <button onClick={()=>setShowCatModal(true)} style={{padding:"7px 14px",borderRadius:20,fontSize:13,fontWeight:600,border:"1.5px dashed #D1D5DB",background:"transparent",color:"#9CA3AF",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:15}}>+</span> Category
                    </button>
                  )}
                </div>

                {/* Subcategory pills — shown when a category with subcats is selected */}
                {selectedCat !== "All" && (currentSubcats.length > 0 || isAdmin) && (
                  <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap",alignItems:"center",paddingLeft:4}}>
                    <span style={{fontSize:11,fontWeight:600,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:0.5,marginRight:4}}>↳</span>
                    <button onClick={()=>setSelectedSubcat("All")}
                      style={{padding:"4px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:selectedSubcat==="All"?"2px solid #374151":"1.5px solid #E5E7EB",background:selectedSubcat==="All"?"#374151":"#fff",color:selectedSubcat==="All"?"#fff":"#6B7280"}}>
                      All
                    </button>
                    {currentSubcats.map(s => {
                      const active = selectedSubcat === s.name;
                      const col = CATEGORY_COLORS[selectedCat] || "#374151";
                      return (
                        <div key={s.id} style={{display:"flex",alignItems:"center",gap:0,borderRadius:20,border:active?`2px solid ${col}`:"1.5px solid #E5E7EB",background:active?col:"#fff",overflow:"hidden"}}>
                          <button onClick={()=>setSelectedSubcat(active?"All":s.name)}
                            style={{padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer",border:"none",background:"transparent",color:active?"#fff":"#6B7280"}}>
                            {s.name}
                          </button>
                          {isAdmin && (
                            <button onClick={()=>handleDeleteSubcat(s.id)}
                              style={{padding:"4px 8px 4px 0",fontSize:10,border:"none",background:"transparent",color:active?"rgba(255,255,255,0.7)":"#9CA3AF",cursor:"pointer",lineHeight:1}}>
                              ✕
                            </button>
                          )}
                        </div>
                      );
                    })}
                    {isAdmin && <SubcatAdder category={selectedCat} onAdd={handleAddSubcat}/>}
                  </div>
                )}

                <div style={{fontSize:13,color:"#9CA3AF",marginBottom:16,fontWeight:500}}>
                  Showing {filtered.length} of {items.length} items
                  {filtered.length>0&&<span style={{marginLeft:12,color:"#374151",fontWeight:700}}>Total: {formatCurrency(filtered.reduce((s,i)=>s+i.value,0))}</span>}
                </div>

                {filtered.length===0 ? (
                  <div style={{textAlign:"center",padding:"60px 20px",color:"#9CA3AF",background:"#fff",borderRadius:16,border:"1px solid #F0F0F0"}}>
                    <div style={{fontSize:48,marginBottom:12}}>🔍</div>
                    <div style={{fontSize:16,fontWeight:600,color:"#374151",marginBottom:4}}>No items found</div>
                    <div style={{fontSize:13}}>{items.length===0?"Click Admin Login to start adding items!":"Try a different search or category"}</div>
                  </div>
                ) : viewMode==="grid" ? (
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:16}}>
                    {filtered.map(item=>(
                      <ItemCard key={item.id} item={item} isAdmin={isAdmin} onEdit={i=>setModal(i)} onDelete={handleDelete} onPriceCheck={i=>setPriceItem(i)}/>
                    ))}
                  </div>
                ) : (
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <div style={{display:"grid",gridTemplateColumns:"48px 2fr 120px 100px 100px 120px "+(isAdmin?"120px":"50px"),gap:12,padding:"10px 16px",background:"#F8F8F8",borderRadius:10,fontSize:11,fontWeight:700,color:"#9CA3AF",letterSpacing:0.5,textTransform:"uppercase"}}>
                      {[["",""],["Name","name"],["Category","category"],["Condition","condition"],["Year","year"],["Value","value"],...(isAdmin?[["Actions",""]]:[])] .map(([label,field])=>(
                        <div key={label} onClick={()=>field&&setSortBy(field)} style={{cursor:field?"pointer":"default",userSelect:"none"}}>
                          {label}{field&&sortBy===field&&(sortDir==="asc"?"↑":"↓")}
                        </div>
                      ))}
                    </div>
                    {filtered.map(item=>(
                      <div key={item.id} style={{display:"grid",gridTemplateColumns:"48px 2fr 120px 100px 100px 120px "+(isAdmin?"120px":"50px"),gap:12,padding:"12px 16px",background:"#fff",borderRadius:12,border:"1px solid #F0F0F0",alignItems:"center",fontSize:13,transition:"box-shadow 0.2s"}}
                        onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.08)"}
                        onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                        <div style={{width:44,height:44,borderRadius:8,overflow:"hidden",background:`linear-gradient(135deg,${(CATEGORY_COLORS[item.category]||"#999")+"25"},${(CATEGORY_COLORS[item.category]||"#999")+"45"})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {item.image?<img src={item.image} alt={item.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:20}}>{CATEGORY_ICONS[item.category]||"📦"}</span>}
                        </div>
                        <div>
                          <div style={{fontWeight:700,color:"#111",marginBottom:2}}>{item.name}</div>
                          {item.subcategory&&<div style={{fontSize:11,color:CATEGORY_COLORS[item.category]||"#6B7280",fontWeight:600}}>{item.subcategory}</div>}
                          {item.notes&&<div style={{fontSize:11,color:"#9CA3AF",fontStyle:"italic"}}>{item.notes}</div>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}><span>{CATEGORY_ICONS[item.category]}</span><span style={{fontSize:12,color:"#374151",fontWeight:500}}>{item.category}</span></div>
                        <ConditionBadge condition={item.condition}/>
                        <div style={{color:"#6B7280",fontWeight:500}}>{item.year}</div>
                        <div style={{fontWeight:800,color:"#111",fontSize:15}}>{formatCurrency(item.value)}</div>
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={()=>setPriceItem(item)} style={{background:"#F0FDF4",border:"none",borderRadius:6,padding:"5px 8px",fontSize:11,color:"#16A34A",cursor:"pointer",fontWeight:600}} title="eBay price check">📊</button>
                          {isAdmin&&<>
                            <button onClick={()=>setModal(item)} style={{background:"#F8F8F8",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,color:"#374151",cursor:"pointer",fontWeight:500}}>Edit</button>
                            <button onClick={()=>handleDelete(item.id)} style={{background:"#FEF2F2",border:"none",borderRadius:6,padding:"5px 8px",fontSize:11,color:"#DC2626",cursor:"pointer"}}>✕</button>
                          </>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </>
            )}
          </div>

          {showPwModal && <PasswordModal onSuccess={()=>{setIsAdmin(true);setShowPwModal(false);}} onClose={()=>setShowPwModal(false)}/>}
          {showCatModal && <ManageCategoriesModal customCats={customCats} onClose={()=>setShowCatModal(false)} onAdd={handleAddCat} onDelete={handleDeleteCat}/>}
          {modal && <Modal item={modal==="add"?null:modal} seriesList={seriesList} allCats={allCategories} subcategories={subcategories} onSave={handleSave} onClose={()=>setModal(null)}/>}
          {priceItem && <PriceTrackerModal item={priceItem} onClose={()=>setPriceItem(null)}/>}
          {showInsights && <InsightsModal items={items} seriesList={seriesList} allCats={allCategories} isAdmin={isAdmin} onClose={()=>setShowInsights(false)} onAddSeries={handleAddSeries} onDeleteSeries={handleDeleteSeries}/>}
          {showBgModal && <BackgroundModal current={bgSettings} onSave={handleSaveBg} onRemove={handleRemoveBg} onClose={()=>setShowBgModal(false)}/>}
          </div>{/* end content z-index wrapper */}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
